<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Workday Integrations Team</title>

    <style>
      /* ---------- Base (Dark Mode) ---------- */
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background-color: #0f172a; /* dark slate */
        color: #e5e7eb; /* light gray text */
        line-height: 1.6;
      }

      /* ---------- Hero section ---------- */
      .hero {
        position: relative;
        height: 300px;
        background-image: url("download.jpg"); /* local image */
        background-size: cover;
        background-position: center;
      }

      .hero-title {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 2.5rem;
        color: #ffffff;
        background: rgba(0, 0, 0, 0.65); /* darker overlay */
      }

      /* ---------- Content ---------- */
      .content {
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 20px;
      }

      /* ---------- Containers ---------- */
      .container-row {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      .box {
        flex: 1;
        min-width: 250px;
        padding: 20px;
        background-color: #111827; /* dark card */
        border-radius: 8px;
        border: 1px solid #1f2933;
      }

      .box h2 {
        margin-top: 0;
        color: #f9fafb;
      }

      .box p {
        color: #d1d5db;
      }
    </style>
  </head>

 <body>
    <!-- Hero -->
    <section class="hero">
      <div class="hero-title">
        Workday Integrations Home
      </div>
    </section>

    <!-- Content -->
    <section class="content">
      <p>
        This is a home for technical Workday team members. Find documentation and resources here!
      </p>

      <div class="container-row">
        <div class="box">
          <h2>Operations</h2>
          <p>
            
          </p>
        </div>

        <div class="box">
          <h2>Build</h2>
          <p>Content for the second container.</p>
        </div>

        <div class="box">
          <h2>Orchestrate</h2>
          <p>Content for the third container.</p>
        </div>
      </div>
    </section>
  </body>
</html>
